[pytest]
# URL base da API — altere aqui para apontar para outro ambiente
base_url = https://compassuol.serverest.dev

# Exibe nome completo de cada teste durante a execução
addopts = -v --tb=short

# Diretório raiz dos testes
testpaths = tests

# Marcadores customizados (evita warnings do pytest)
markers =
    smoke: testes rápidos de sanidade
    regression: testes de regressão completos
